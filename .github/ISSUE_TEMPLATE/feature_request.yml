name: Feature Request
description: Suggest new functionality or an improvement to something that already exists.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! Please describe what you'd like and why. Searching existing issues first helps avoid duplicates.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short description of the request.
      placeholder: e.g. Allow bulk selection of observations by drawing a box on the map
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application does this relate to?
      options:
        - Website – search / browse observations
        - Website – results / files / details
        - GIS map
        - Processing – choosing observations
        - Processing – submitting jobs
        - Processing – outputs / results
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and what makes it hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Describe the behavior or feature you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you currently use, or other approaches you thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help — examples, screenshots, references to similar tools.
    validations:
      required: false
